    <style>
        :root {
            --rose-600: #c2185b;
            --rose-700: #9c1450;
            --rose-50: #fdf2f8;
            --rose-100: #fce7f2;
            --gold-400: #c9a96e;
            --gray-50: #f9f6f8;
            --gray-100: #f3eff2;
            --gray-200: #e8e1e5;
            --gray-500: #8a7d84;
            --gray-700: #4a3d43;
            --white: #ffffff;
            --dark: #1f1419;
            --text: #3d2c35;
            --text-light: #7a6b73;
            --shadow-card: 0 1px 3px rgba(31,20,25,.04), 0 4px 14px rgba(31,20,25,.06);
            --shadow-hover: 0 8px 28px rgba(31,20,25,.1);
            --radius-lg: 16px;
            --radius-full: 9999px;
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --header-h: 68px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
        body{
            font-family:var(--font-body);
            background:var(--gray-50);
            color:var(--text);
            line-height:1.6;
            padding-top:var(--header-h);
        }
        /* HEADER */
        .header{
            position:fixed;top:0;left:0;right:0;z-index:1000;
            height:var(--header-h);
            background:rgba(255,255,255,.88);
            backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(194,24,91,.08);
            display:flex;align-items:center;
            transition:box-shadow .3s;
        }
        .header.scrolled{box-shadow:0 4px 20px rgba(31,20,25,.08)}
        .header-inner{
            width:100%;max-width:1260px;margin:0 auto;padding:0 20px;
            display:flex;align-items:center;justify-content:space-between;gap:12px;
        }
        .logo-link{
            display:flex;align-items:center;gap:6px;
            background:var(--white);border-radius:var(--radius-lg);
            padding:6px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 0 0 1px rgba(201,169,110,.18);
            text-decoration:none;transition:.25s;
        }
        .logo-link:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
        .logo-img{width:36px;height:36px;object-fit:contain;border-radius:50%}
        .logo-text{font-family:var(--font-heading);font-size:1.3rem;font-weight:700;color:var(--dark)}
        .logo-text .highlight{color:var(--rose-600)}
        .search-box{position:relative}
        .search-input{
            width:190px;padding:9px 36px 9px 14px;
            border:1.5px solid var(--gray-200);border-radius:var(--radius-full);
            font-size:.85rem;background:var(--white);outline:none;transition:.25s;
        }
        .search-input:focus{border-color:var(--rose-600);box-shadow:0 0 0 4px rgba(194,24,91,.06);width:240px}
        .search-btn{
            position:absolute;right:4px;top:50%;transform:translateY(-50%);
            background:var(--rose-600);border:none;width:30px;height:30px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;
        }
        /* HERO BANNER */
        .hero{
            position:relative;display:flex;align-items:center;justify-content:center;
            min-height:380px;background:linear-gradient(135deg,#fce7f2,#fdf2f8);
            overflow:hidden;text-align:center;padding:30px 20px;
        }
        .hero-bg{
            position:absolute;inset:0;background-size:cover;background-position:center;
            opacity:.25;z-index:0;
            background-image:url('imagens/banner/banner-desktop.jpg');
        }
        @media(max-width:768px){.hero-bg{background-image:url('imagens/banner/banner-mobile.jpg')}}
        .hero-content{position:relative;z-index:1;max-width:600px}
        .hero-title{font-family:var(--font-heading);font-size:clamp(2rem,4.5vw,3rem);font-weight:700;color:var(--dark)}
        .hero-sub{color:var(--text-light);margin:10px 0 24px;font-size:1rem}
        .btn{
            display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border-radius:var(--radius-full);
            font-weight:600;font-size:.9rem;text-decoration:none;transition:.25s;cursor:pointer;
            border:none;white-space:nowrap;
        }
        .btn-primary{background:var(--rose-600);color:#fff;box-shadow:0 4px 14px rgba(194,24,91,.25)}
        .btn-primary:hover{background:var(--rose-700);transform:translateY(-2px)}
        .btn-outline{background:transparent;color:var(--rose-600);border:2px solid rgba(194,24,91,.25)}
        .btn-outline:hover{background:rgba(194,24,91,.04);border-color:var(--rose-600)}
        /* FILTERS */
        .filter-bar{
            max-width:1260px;margin:14px auto 0;padding:10px 20px;
            display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
        }
        .filter-pill{
            padding:8px 16px;border-radius:var(--radius-full);
            background:var(--white);border:1.5px solid var(--gray-200);
            font-size:.82rem;font-weight:500;cursor:pointer;transition:.2s;
        }
        .filter-pill.active{background:var(--rose-600);color:#fff;border-color:var(--rose-600)}
        .result-count{margin-left:auto;font-size:.8rem;color:var(--text-light)}
        /* PRODUCT GRID */
        .products-section{max-width:1260px;margin:0 auto;padding:20px 20px 50px}
        .products-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
            gap:18px;
        }
        .product-card{
            background:var(--white);border-radius:var(--radius-lg);
            overflow:hidden;box-shadow:var(--shadow-card);
            transition:.3s;display:flex;flex-direction:column;
            border:1px solid transparent;
        }
        .product-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-3px);border-color:rgba(194,24,91,.1)}
        .product-img-wrap{
            aspect-ratio:1/1;background:linear-gradient(140deg,var(--rose-50),#fff);
            display:flex;align-items:center;justify-content:center;position:relative;
        }
        .product-img{max-width:70%;max-height:70%;object-fit:contain;transition:.3s}
        .product-card:hover .product-img{transform:scale(1.05)}
        .fallback-img{display:none;max-width:50%;max-height:50%;opacity:.6}
        .product-info{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column;gap:6px}
        .product-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-light)}
        .product-name{font-family:var(--font-heading);font-size:1rem;font-weight:600;color:var(--dark);line-height:1.3}
        .product-desc{font-size:.78rem;color:var(--text-light);line-height:1.4}
        .product-code{font-size:.7rem;color:var(--gray-500)}
        .product-price{font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--rose-600)}
        .card-buttons{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
        .btn-sm{
            flex:1;min-width:70px;padding:7px 8px;border-radius:var(--radius-full);
            font-size:.7rem;font-weight:600;text-decoration:none;text-align:center;
            display:inline-flex;align-items:center;justify-content:center;gap:3px;
            transition:.2s;border:none;cursor:pointer;
        }
        .btn-buy{background:var(--rose-600);color:#fff}
        .btn-buy:hover{background:var(--rose-700)}
        .btn-wpp{background:#25D366;color:#fff}
        .btn-wpp:hover{background:#1da851}
        .btn-email{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}
        .btn-email:hover{background:var(--gray-200)}
        /* FOOTER */
        .footer{
            background:var(--white);border-top:1px solid var(--gray-100);
            padding:24px 20px;text-align:center;font-size:.8rem;color:var(--text-light);
        }
        .footer a{color:var(--rose-600);font-weight:600;text-decoration:none}
        .float-btns{
            position:fixed;bottom:18px;right:18px;z-index:999;
            display:flex;flex-direction:column;gap:10px;
        }
        .float-btn{
            width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            text-decoration:none;box-shadow:0 4px 14px rgba(0,0,0,.1);transition:.25s;
        }
        .float-btn:hover{transform:translateY(-2px)}
        .float-wpp{background:#25D366;color:#fff}
        .float-email{background:var(--white);color:var(--rose-600);border:1.5px solid var(--gray-200)}
        @media(max-width:768px){
            .products-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
            .product-info{padding:10px 10px 12px}
            .product-name{font-size:.85rem}
            .btn-sm{font-size:.65rem;padding:6px}
            .hero{min-height:280px}
        }
    </style>

            function createCard(p) {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                <div class="product-img-wrap">
                    <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                    <img src="imagens/logo/logo-ana-essenci.png" alt="Fallback" class="fallback-img" style="display:none">
                </div>
                <div class="product-info">
                    <span class="product-cat">${p.category}</span>
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-desc">${p.desc}</p>
                    <span class="product-code">Cód. ${p.code}</span>
                    <div class="product-price">${p.price}</div>
                    <div class="card-buttons">
                        <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="btn-sm btn-buy">Comprar</a>
                        <a href="${whatsappLink}" target="_blank" rel="noopener noreferrer" class="btn-sm btn-wpp">WhatsApp</a>
                        <a href="${emailLink}" target="_blank" class="btn-sm btn-email">E-mail</a>
                    </div>
                </div>`;
                return card;
            }

            function render(prods) {
                grid.innerHTML = '';
                if(prods.length===0) {
                    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:40px;">Nenhum produto encontrado.</p>`;
                } else {
                    prods.forEach(p => grid.appendChild(createCard(p)));
                }
                resultCount.textContent = `${prods.length} produto${prods.length!==1?'s':''}`;
            }

            function filter() {
                let filtered = allProducts;
                if(currentFilter!=='all') filtered = filtered.filter(p=>p.category===currentFilter);
                if(currentSearch.trim()) {
                    const s = currentSearch.trim().toLowerCase();
                    filtered = filtered.filter(p=> p.name.toLowerCase().includes(s) || p.desc.toLowerCase().includes(s) || p.category.includes(s));
                }
                render(filtered);
            }

            searchInput.addEventListener('input', ()=>{
                currentSearch = searchInput.value;
                filter();
            });

            filterPills.forEach(pill=>{
                pill.addEventListener('click', function(){
                    filterPills.forEach(p=>p.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    filter();
                });
            });

            window.addEventListener('scroll', ()=>{

            });
